<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Customer</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .container{
            width:400px;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:25px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            background:#007bff;
            color:white;
            padding:10px;
            border:none;
            width:100%;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Add Customer</h2>

    <form th:action="@{/saveCustomer}" th:object="${customer}" method="post">

        <input type="hidden" th:field="*{id}">

        <input type="text" th:field="*{name}" placeholder="Enter Name">

        <input type="text" th:field="*{email}" placeholder="Enter Email">

        <input type="text" th:field="*{phone}" placeholder="Enter Phone">

        <input type="text" th:field="*{company}" placeholder="Enter Company">

        <button type="submit">Save Customer</button>

    </form>

</div>

</body>
</html>
