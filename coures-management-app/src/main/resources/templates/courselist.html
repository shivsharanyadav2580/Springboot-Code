<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Course Management</title>

  <style>
    body {
        font-family: "Poppins", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #dbeafe, #eff6ff);
        margin: 0;
        padding: 0;
    }

    .container {
        width: 90%;
        max-width: 1100px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        animation: fadeIn 0.7s ease-in-out;
        border-top: 6px solid #3b82f6;
    }

    h3 {
        text-align: center;
        color: #1e3a8a;
        margin-bottom: 18px;
        font-size: 28px;
        letter-spacing: 0.5px;
    }

    hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, #93c5fd, transparent);
        margin-bottom: 20px;
    }

    a.btn {
        display: inline-block;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        padding: 10px 22px;
        border-radius: 25px;
        font-size: 14px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
    }

    a.btn:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.45);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 25px;
        border-radius: 14px;
        overflow: hidden;
    }

    thead {
        background: linear-gradient(135deg, #1e40af, #2563eb);
        color: #ffffff;
    }

    thead th {
        padding: 14px;
        text-align: left;
        font-size: 14px;
        letter-spacing: 0.4px;
    }

    tbody tr {
        background: #f8fbff;
        border-bottom: 1px solid #e5edff;
        transition: 0.25s ease;
    }

    tbody tr:nth-child(even) {
        background: #eef5ff;
    }

    tbody tr:hover {
        background: #dbeafe;
        transform: scale(1.01);
    }

    td {
        padding: 14px;
        font-size: 14px;
        color: #1f2933;
    }

    .btn-update {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.25s ease;
        box-shadow: 0 4px 10px rgba(22, 163, 74, 0.35);
    }

    .btn-update:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 14px rgba(22, 163, 74, 0.45);
    }

    .btn-delete {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.25s ease;
        box-shadow: 0 4px 10px rgba(220, 38, 38, 0.35);
    }

    .btn-delete:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 14px rgba(220, 38, 38, 0.45);
    }

    .row-actions {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>

<body>

<div class="container">

  <h3>Course Management</h3>
  <hr>

  <!-- Add new course button -->
  <a th:href="@{/showCourseForm}" class="btn">Add New Course</a>

  <table>
    <thead>
    <tr>
      <th>Course Name</th>
      <th>Trainer</th>
      <th>Duration</th>
      <th>Fees</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="course : ${courses}">
      <td th:text="${course.id}"></td>
      <td th:text="${course.courseName}"></td>
      <td th:text="${course.trainerName}"></td>
      <td th:text="${course.courseDuration}"></td>
      <td th:text="${course.coursePrice}"></td>

      <td>
        <div class="row-actions">

          <!-- Update button -->
          <form th:action="@{/updateCourseForm}" method="GET">
            <input type="hidden" name="id" th:value="${course.id}" />
            <button type="submit" class="btn-update">Update</button>
          </form>

          <!-- Delete button -->
          <form th:action="@{/deleteCourse}" method="GET">
            <input type="hidden" name="id" th:value="${course.id}" />
            <button type="submit" class="btn-delete"
                    onclick="return confirm('Are you sure you want to delete this course permanently?')">
              Delete
            </button>
          </form>

        </div>
      </td>

    </tr>
    </tbody>
  </table>

</div>

</body>

</html>
